{% extends "base.html" %}
{% block content %}
<h1>カテゴリの新規登録</h1>
<form method="POST">
    <table class="table table-striped-columns">
        <tr>
            <th>登録するカテゴリ名</th>
        </tr>
        <tr>
            <td>
                <input type="text" class="form-control" name="category">
            </td>
        </tr>
    </table>
    <input type="submit" value="カテゴリの登録" class="btn btn-primary">
</form>
<a href="{{ url_for('top') }}" role="button" class="btn btn-secondary">一覧に戻る</a>
{% endblock %}
