<!doctype html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>メモアプリ</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

</head>
<body class="d-flex flex-column min-vh-100">
    <!-- ヘッダー w/ bootstrap -->
    <nav class="navbar navbar-expand-lg bg-body-tertiary sticky-top">
        <div class="container-fluid">
            <a class="navbar-brand" href="{{url_for('top')}}">Memo APP</a>
        </div>
    </nav>
    <main class="container flex-grow-1">
        <!-- flash メッセージ部分 -->
        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for category, message in messages %}
            <div class="alert alert-{{category}}">{{ message }}</div>
            {% endfor %}
        {% endif %}
        {% endwith %}
        {%  block content %}
        {% endblock %}
    </main>
    <footer class="py-3 bg-body-tertiary">
        <p class="text-center text-body-secondary">Original is <a href="https://www.udemy.com/course/flask_memo/">This Udemy
                course</a>, Edited by Souken521</p>
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
