{% extends "base.html" %}
{% block content %}
<h1>新規ユーザー登録</h1>
<!--エラーメッセージ部分-->
<p style="color: red">{{ error_message }}</p>

<!-- ログインフォーム-->
<form method="POST">
    <table class="table table-striped-columns">
        <tr>
            <th>ユーザーID</th>
            <th>パスワード</th>
        </tr>
        <tr>
            <td>
                <input type="text" name="userid" value="{{ userid }}">
            </td>
            <td>
                <input type="password" name="password">
            </td>
        </tr>
    </table>
    <input type="submit" value="ユーザー登録" class="btn btn-primary">
</form>
<a href="login" role="button" class="btn btn-secondary">ログイン画面へ戻る</a>
{% endblock %}
