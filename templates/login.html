{% extends "base.html" %}
{% block content %}
<h1>ログイン画面</h1>
<!--エラーメッセージ部分-->
<p style="color: red">{{ error_message }}</p>

<!-- ログインフォーム-->
<form method="POST">
    <div class="d-flex flex-column justify-content-center  mb-3">
        <div class="p-2"><p>ユーザーID <span class="text-danger">*</span></p></div>
        <div class="p-2"><input type="text" class="form-control" name="userid" value="{{ userid }}"></div>
        <div class="p-2"><p>パスワード<span class="text-danger">*</span></p></div>
        <div class="p-2"><input type="password" class="form-control" name="password"></div>
    </div>

    <input type="submit" value="ログイン" class="btn btn-primary">
</form>
<a href="{{url_for('signup')}}" class="btn btn-success">新規ユーザー登録</a>
{% endblock %}
